<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soporte Mallorca | Nueva Incidencia</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="icon" type="image/png" href="../img/FAVICON.png">
    <style>
        :root { --jira-blue: #2563eb; --jira-border: rgba(255, 255, 255, 0.1); }
        body { margin: 0; background: #0f172a; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .linux-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; position: relative; z-index: 1; }
        
        .jira-form-container { 
            background: rgba(15, 23, 42, 0.7); 
            backdrop-filter: blur(20px); 
            border: 1px solid var(--jira-border); 
            border-radius: 16px; 
            padding: 40px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            width: 100%; 
            max-width: 700px; 
            margin: 20px; 
            position: relative;
        }

        .form-header { border-bottom: 1px solid var(--jira-border); padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .form-header h2 { margin: 0; font-size: 1.5rem; display: flex; align-items: center; gap: 10px; }
        
        .field-group { margin-bottom: 25px; }
        .field-label { display: block; font-size: 0.75rem; font-weight: 700; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        
        .jira-input { 
            width: 100%; 
            background: rgba(0, 0, 0, 0.4); 
            border: 1px solid var(--jira-border); 
            border-radius: 8px; 
            padding: 12px 16px; 
            color: white; 
            font-family: 'Inter', sans-serif; 
            font-size: 0.95rem; 
            transition: all 0.3s ease; 
            box-sizing: border-box;
        }
        .jira-input:focus { outline: none; border-color: var(--jira-blue); background: rgba(37, 99, 235, 0.05); }
        .jira-input.mono { font-family: 'Fira Code', monospace; color: #10b981; cursor: not-allowed; opacity: 0.8; }
        
        .grid-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .btn-deploy { 
            background: var(--jira-blue); 
            color: white; 
            border: none; 
            padding: 16px; 
            border-radius: 12px; 
            width: 100%; 
            font-weight: 800; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px; 
            transition: all 0.4s; 
            margin-top: 20px; 
            font-size: 1rem;
        }
        .btn-deploy:hover { background: #1d4ed8; transform: translateY(-2px); box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4); }
        .btn-deploy:disabled { background: #475569; cursor: wait; transform: none; }

        .file-custom { 
            border: 2px dashed var(--jira-border); 
            padding: 25px; 
            text-align: center; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: 0.3s; 
            position: relative;
        }
        .file-custom:hover { border-color: var(--jira-blue); background: rgba(37, 99, 235, 0.05); }
        
        #fileNameDisplay { font-size: 0.8rem; color: #10b981; margin-top: 10px; display: block; font-family: 'Fira Code'; }
        
        .main-nav { position: absolute; top: 0; left: 0; width: 100%; padding: 20px; display: flex; z-index: 20; pointer-events: none; }
        .nav-left { pointer-events: auto; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 50px; backdrop-filter: blur(10px); display: flex; gap: 15px; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        .main-nav a { color: white; text-decoration: none; font-size: 1.2rem; transition: 0.3s; }

        #starsCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
    </style>
</head>
<body>
    <canvas id="starsCanvas"></canvas>
    
    <nav class="main-nav">
        <div class="nav-left">
            <a href="tickets.html" title="Volver"><i class="fas fa-arrow-left"></i></a>
            <div class="logo" style="font-weight: 600;">Nuevo Ticket <span style="color:var(--jira-blue)">// Sistema</span></div>
        </div>
    </nav>

    <div class="linux-container">
        <section class="jira-form-container">
            <div class="form-header">
                <div>
                    <h2><i class="fas fa-ticket-alt" style="color: var(--jira-blue)"></i> Crear Incidencia</h2>
                    <p style="font-size: 0.8rem; color: #64748b; margin: 5px 0 0 0;">Despliega una nueva solicitud en el servidor central.</p>
                </div>
            </div>

            <form id="formNuevoTicket" name="nuevo-ticket-soporte" data-netlify="true">
                <input type="hidden" name="form-name" value="nuevo-ticket-soporte" />

                <div class="grid-fields">
                    <div class="field-group">
                        <label class="field-label">Informador (User ID)</label>
                        <input type="text" id="ticketUser" name="usuario" class="jira-input mono" readonly placeholder="Cargando...">
                    </div>
                    <div class="field-group">
                        <label class="field-label">Tipo / Prioridad</label>
                        <select id="ticketType" name="prioridad" class="jira-input">
                            <option value="Avería">🛠️ Avería Técnica</option>
                            <option value="Software">💻 Software / Bug</option>
                            <option value="Acceso">🔑 Credenciales</option>
                            <option value="Ciberseguridad">🔒 Ciberseguridad</option>
                            <option value="redes">🌐 Redes</option>
                        </select>
                    </div>
                </div>

                <div class="field-group">
                    <label class="field-label">Asunto (Summary)</label>
                    <input type="text" id="ticketSummary" name="asunto" class="jira-input" placeholder="Ej: Error de conexión en base de datos" required autocomplete="off">
                </div>

                <div class="field-group">
                    <label class="field-label">Descripción</label>
                    <textarea id="ticketDescription" name="descripcion" class="jira-input" style="height: 120px; resize: none;" placeholder="Detalla el problema..." required></textarea>
                </div>

                <div class="field-group">
                    <label class="field-label">Evidencia (Max 800KB)</label>
                    <div class="file-custom" onclick="document.getElementById('ticketFile').click()">
                        <i class="fas fa-cloud-upload-alt" style="font-size: 2rem; color: var(--jira-blue); margin-bottom: 10px;"></i>
                        <p style="margin: 0; font-size: 0.9rem;">Click para adjuntar imagen</p>
                        <span id="fileNameDisplay">Ningún archivo seleccionado</span>
                        <input type="file" id="ticketFile" accept="image/*" style="display: none;">
                    </div>
                </div>

                <button type="submit" class="btn-deploy" id="btnSubmit">
                    <i class="fas fa-rocket"></i> REGISTRAR INCIDENCIA
                </button>
            </form>
        </section>
    </div>

    <script type="module">
        import { db } from './js/firebase-config.js';
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const auth = getAuth();
        
        const ALIAS_MAP = { 'jd8693011': 'Pezuz_' };
        let finalUserIdentity = ""; 

        onAuthStateChanged(auth, (user) => {
            const userInput = document.getElementById('ticketUser');
            if (user) {
                const email = user.email;
                const alias = email.split('@')[0];
                const googleName = user.displayName;
                const mapName = ALIAS_MAP[alias];
                finalUserIdentity = mapName || googleName || alias;
                userInput.value = finalUserIdentity.toUpperCase();
            } else {
                window.location.href = "login.html";
            }
        });

        document.getElementById('ticketFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const fileName = file ? file.name : "Ningún archivo seleccionado";
            document.getElementById('fileNameDisplay').innerText = fileName;
            if(file && file.size > 819200) { 
                alert("⚠️ La imagen es muy pesada (>800KB).");
                this.value = ""; 
                document.getElementById('fileNameDisplay').innerText = "Archivo demasiado grande";
            }
        });

        const convertBase64 = (file) => {
            return new Promise((resolve, reject) => {
                const fileReader = new FileReader();
                fileReader.readAsDataURL(file);
                fileReader.onload = () => resolve(fileReader.result);
                fileReader.onerror = (error) => reject(error);
            });
        };

        // ENVIAR (MODIFICADO PARA NETLIFY)
        document.getElementById('formNuevoTicket').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const originalBtnText = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i> SUBIENDO TICKET...`;

            try {
                let imagenBase64 = null;
                const fileInput = document.getElementById('ticketFile');
                const summary = document.getElementById('ticketSummary').value;
                const description = document.getElementById('ticketDescription').value;
                const type = document.getElementById('ticketType').value;
                
                if (fileInput.files.length > 0) {
                    imagenBase64 = await convertBase64(fileInput.files[0]);
                }

                // 1. Guardar en Firebase (Tu base de datos)
                await addDoc(collection(db, "tickets"), {
                    cliente: finalUserIdentity, 
                    titulo: summary,
                    descripcion: description,
                    tipo: type,
                    estado: 'abierto',
                    imagenAdjunta: imagenBase64,
                    fecha: serverTimestamp()
                });

                // 2. ENVIAR A NETLIFY (Para que te llegue el correo sin Make)
                const myForm = e.target;
                const formData = new FormData(myForm);
                
                await fetch("/", {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: new URLSearchParams(formData).toString(),
                });

                btn.innerHTML = `<i class="fas fa-check"></i> ¡ÉXITO!`;
                setTimeout(() => window.location.href = 'tickets.html', 1000);

            } catch (error) { 
                console.error(error);
                alert("Error: " + error.message);
                btn.disabled = false;
                btn.innerHTML = originalBtnText;
            }
        };
    </script>
    <script src="../js/stars.js"></script>


<script type="module">
    import { desbloquearLogro } from '../js/logros-manager.js';
    import { auth } from '../js/firebase.config.premios.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    onAuthStateChanged(auth, (user) => {
        if (user) {
            // ID: 'incidencias' | Nombre: 'Creador de Incidencias' | XP: 50
            desbloquearLogro('incidencias', 'Creador de Incidencias', 50);
        }
    });
</script>
</body>
</html>
