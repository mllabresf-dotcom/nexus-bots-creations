<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestión de Incidencias | Soporte Mallorca</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="icon" type="image/png" href="../img/FAVICON.png">

    <style>
        :root {
            --primary: #2563eb;
            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-muted: #94a3b8;
            --bg-body: #020617;
            --success-bg: rgba(16, 185, 129, 0.15);
            --success-border: rgba(16, 185, 129, 0.4);
            --success-text: #34d399;
            --danger-bg: rgba(239, 68, 68, 0.15);
            --danger-border: rgba(239, 68, 68, 0.4);
            --danger-text: #f87171;
            --info-bg: rgba(59, 130, 246, 0.15);
            --info-border: rgba(59, 130, 246, 0.4);
            --info-text: #60a5fa;
        }

        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background-color: var(--bg-body); color: white; overflow-x: hidden; width: 100%; }

        .main-nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 700; font-size: 1.1rem; }
        #user-role-display { font-size: 0.65rem; opacity: 0.6; margin-left: 10px; border: 1px solid var(--glass-border); padding: 2px 8px; border-radius: 4px; }

        .linux-container { display: flex; padding: 30px 5%; gap: 30px; max-width: 1600px; margin: 0 auto; min-height: calc(100vh - 70px); }
        aside { width: 260px; min-width: 260px; display: flex; flex-direction: column; gap: 10px; }
        main { flex: 1; }

        .search-box { width: 100%; margin-bottom: 25px; position: relative; }
        .search-box input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 12px 15px 12px 40px; border-radius: 10px; color: white; outline: none; transition: 0.3s; }
        .search-box input:focus { border-color: var(--primary); background: rgba(255,255,255,0.08); }
        .search-box i { position: absolute; left: 15px; top: 15px; color: var(--text-muted); }

        .btn-action { width: 100%; padding: 12px 15px; border-radius: 10px; border: 1px solid transparent; background: transparent; color: var(--text-muted); display: flex; align-items: center; gap: 12px; cursor: pointer; font-weight: 500; transition: 0.2s; }
        .btn-action:hover { background: rgba(255, 255, 255, 0.05); color: white; }
        .btn-action.active { background: rgba(37, 99, 235, 0.15); color: #60a5fa; border-color: rgba(37, 99, 235, 0.3); }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: rgba(15, 23, 42, 0.3); border: 1px solid var(--glass-border); border-radius: 12px; padding: 20px; position: relative; }
        .stat-card b { font-size: 2rem; font-family: 'Fira Code', monospace; }
        .stat-card i { position: absolute; right: 15px; bottom: 15px; font-size: 2rem; opacity: 0.1; }

        .chart-container { background: rgba(15,23,42,0.3); padding: 20px; border-radius: 12px; margin-bottom: 25px; height: 320px; border: 1px solid var(--glass-border); }

        .logs-container { background: rgba(3, 7, 18, 0.4); border: 1px solid var(--glass-border); border-radius: 12px; overflow: hidden; }
        .ticket-header-row, .ticket-item { display: grid; grid-template-columns: 80px 1fr 100px 210px; padding: 15px 20px; border-bottom: 1px solid var(--glass-border); align-items: center; }
        .ticket-item { cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; }
        .ticket-item:hover { background: rgba(255,255,255,0.03); transform: translateX(5px); }

        .ticket-actions { display: flex; gap: 8px; justify-content: flex-end; }
        .ticket-actions button { background: transparent; border: 1px solid transparent; border-radius: 8px; padding: 6px 12px; font-size: 0.75rem; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; height: 34px; transition: 0.2s; }

        .btn-approve { background: var(--success-bg) !important; color: var(--success-text) !important; border: 1px solid var(--success-border) !important; }
        .btn-cancel { background: var(--danger-bg) !important; color: var(--danger-text) !important; border: 1px solid var(--danger-border) !important; }
        .btn-chat { background: var(--info-bg) !important; color: var(--info-text) !important; border: 1px solid var(--info-border) !important; }

        .dot-new { height: 8px; width: 8px; background: #2563eb; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 8px #2563eb; }
        
        /* ESTILOS DE BADGES */
        .badge { padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        .badge-open { background: rgba(37, 99, 235, 0.2); color: #60a5fa; }
        .badge-closed { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .badge-canceled { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        
        /* ESTILO NUEVO REABIERTO */
        .badge-reopened { background: rgba(249, 115, 22, 0.2); color: #fb923c; border: 1px solid rgba(249, 115, 22, 0.3); }

        @media (max-width: 1024px) {
            .linux-container { flex-direction: column; padding: 15px; }
            aside { width: 100%; min-width: 100%; }
            .ticket-sidebar { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
            .ticket-sidebar button:first-child { grid-column: span 2; }
            .stats-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
            .logs-container { overflow-x: auto; }
            .ticket-header-row, .ticket-item { min-width: 750px; }
        }

        #chat-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center; }
        .chat-window { width: 95%; max-width: 750px; height: 85vh; background: #0b0f1a; border-radius: 12px; display: flex; flex-direction: column; border: 1px solid var(--glass-border); }
    </style>
</head>
<body>
    <nav class="main-nav">
        <div class="logo">Soporte Mallorca <span id="user-role-display"></span></div>
        <a href="../dashboard.html" style="color:#ef4444; text-decoration:none;"><i class="fas fa-sign-out-alt"></i></a>
    </nav>

    <div class="linux-container">
        <aside class="ticket-sidebar">
            <button class="btn-action" onclick="window.location.href='crear-ticket.html'" style="background: var(--primary); color: white;">
                <i class="fas fa-plus"></i> Crear Incidencia
            </button>
            
            <div class="sidebar-category" style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; margin: 15px 5px 5px;">Vistas</div>
            
            <button id="btn-view-activos" class="btn-action active" onclick="window.filtrarTickets('activos')">
                <i class="fas fa-inbox"></i> En Curso
            </button>
            
            <button id="btn-view-archivados" class="btn-action" onclick="window.filtrarTickets('archivados')">
                <i class="fas fa-archive"></i> Archivados
            </button>

            <button id="btn-view-todos" class="btn-action" onclick="window.filtrarTickets('todos')">
                <i class="fas fa-layer-group"></i> Todo el Historial
            </button>
        </aside>

        <main>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="ticketSearch" placeholder="Buscar por ID, nombre, email o estado..." onkeyup="window.buscarTickets()">
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <small>PENDIENTES</small><br><b id="count-abiertos" style="color:#60a5fa">0</b>
                    <i class="fas fa-clock"></i>
                </div>
                <div class="stat-card">
                    <small>RESUELTOS</small><br><b id="count-cerrados" style="color:#10b981">0</b>
                    <i class="fas fa-check-circle"></i>
                </div>
                <div class="stat-card">
                    <small>CANCELADOS</small><br><b id="count-cancelados" style="color:#ef4444">0</b>
                    <i class="fas fa-times-circle"></i>
                </div>
                <div class="stat-card">
                    <small>TOTAL</small><br><b id="count-total">0</b>
                    <i class="fas fa-database"></i>
                </div>
            </div>

            <div class="chart-container">
                <canvas id="ticketsChart"></canvas>
            </div>

            <div class="logs-container">
                <div class="ticket-header-row">
                    <div>Ref</div>
                    <div>Resumen</div>
                    <div>Estado</div>
                    <div style="text-align:right">Acciones</div>
                </div>
                <div id="ticket-container"></div>
            </div>
        </main>
    </div>

    <div id="chat-modal">
        <div class="chat-window">
            <div style="padding:15px; border-bottom:1px solid var(--glass-border); display:flex; justify-content:space-between; align-items:center;">
                <div id="chat-ticket-titulo">CHAT</div>
                <button onclick="cerrarChat()" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">&times;</button>
            </div>
            <div id="chat-messages" style="flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:10px;"></div>
            <div style="padding:15px; display:flex; gap:10px; border-top: 1px solid var(--glass-border);">
                <input type="text" id="chat-input" style="flex:1; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); padding:10px; border-radius:8px; color:white;">
                <button id="chat-send-btn" style="background:var(--primary); color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer;">ENVIAR</button>
            </div>
        </div>
    </div>

    <script type="module" src="../js/firebase-config.js"></script>
    <script type="module" src="../js/tickets.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
