
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title data-i18n="login_page_title">Iniciar Sesión - Soporte Mallorca</title>

    <link rel="manifest" href="/json/manifest.json">
    <meta name="theme-color" content="#030712">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Soporte Mallorca">

    <link rel="icon" type="image/png" sizes="64x64" href="img/FAVICON.png">
    <link rel="apple-touch-icon" sizes="180x180" href="img/FAVICON.png">

    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { margin: 0; display: flex; flex-direction: column; min-height: 100vh; font-family: 'Inter', sans-serif; background-color: #030712; color: white; }
        #starsCanvas { position: fixed; top: 0; left: 0; z-index: 0; pointer-events: none; }
        .login-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; z-index: 1; }
        .logo { width: 150px; height: auto; margin: 0 auto 20px auto; display: block; filter: drop-shadow(0 0 10px rgba(37, 99, 235, 0.3)); }
        .main-footer { width: 100%; padding: 20px 0; background: rgba(3, 7, 18, 0.9); backdrop-filter: blur(10px); border-top: 1px solid rgba(255, 255, 255, 0.05); text-align: center; position: relative; z-index: 1; }
        .footer-content p { color: rgba(255, 255, 255, 0.6); font-size: 0.8rem; margin: 5px 0; }
        .social-links { color: white; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <canvas id="starsCanvas"></canvas>

    <div class="login-wrapper">
        <div class="login-container">
            <div class="login-box">
                <img src="img/logo.png" alt="Logo Soporte Mallorca" class="logo">
                <h2 data-i18n="login_h2">Iniciar Sesión</h2>

                <form id="loginForm">
                    <div class="input-group">
                        <label for="username"><i class="fas fa-user"></i> <span data-i18n="label_email">Correo</span></label>
                        <input type="email" id="username" placeholder="ejemplo@correo.com" required>
                    </div>
                    <div class="input-group">
                        <label for="password"><i class="fas fa-lock"></i> <span data-i18n="label_password">Contraseña</span></label>
                        <div class="password-wrapper">
                            <input type="password" id="password" placeholder="Tu contraseña" required>
                            <i class="fas fa-eye" id="togglePassword"></i>
                        </div>
                    </div>
                    <br>
                    <button type="submit" id="loginBtn" class="login-button">
                        <span data-i18n="btn_enter">Entrar</span>
                    </button>
                </form>

                <div class="secondary-actions">
                    <a href="/html/recuperar.html" class="btn-secondary">¿Olvidaste tu contraseña?</a>
                    <a href="/html/registro.html" class="btn-secondary">Crear cuenta</a>
                </div>

                <div class="social-login">
                    <p data-i18n="social_p">O inicia sesión con:</p>
                    <div class="social-buttons">
                        <button type="button" id="btnGuest" class="social-btn guest">Invitado</button>
                        <button type="button" id="btnGoogle" class="social-btn google">
                            <i class="fab fa-google"></i> Google
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="main-footer">
        <div class="footer-content">
            <a href="https://www.instagram.com/quezuz/" target="_blank" class="social-links">@QUEZUZ</a>
            <p>&copy; 2025 Soporte Mallorca. | <a href="https://soporte-mallorca.vercel.app/contacto" style="color: #2563eb;">Soporte</a></p>
        </div>
    </footer>

    <script src="js/traductor.js"></script>
<script type="module" src="js/script.js?v=3.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.log("SW Error", err));
            });
        }
    </script>
</body>
</html>
